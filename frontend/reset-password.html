<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Сброс пароля</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #667eea, #764ba2);
    }
    .container {
      background: white;
      padding: 2rem;
      border-radius: 10px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      max-width: 400px;
      width: 100%;
    }
    h2 { text-align: center; color: #333; margin-bottom: 1.5rem; }
    input {
      width: 100%;
      padding: 0.8rem;
      margin: 0.5rem 0;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 1rem;
    }
    button {
      width: 100%;
      padding: 0.8rem;
      margin-top: 1rem;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 1rem;
    }
    button:hover { background: #5568d3; }
    .message {
      padding: 0.8rem;
      margin: 1rem 0;
      border-radius: 5px;
      text-align: center;
    }
    .success { background: #d4edda; color: #155724; }
    .error { background: #f8d7da; color: #721c24; }
  </style>
</head>
<body>
  <div class="container">
    <h2>🔐 Новый пароль</h2>
    <div id="message"></div>
    <form id="resetForm">
      <input type="password" id="newPassword" placeholder="Введите новый пароль (мин. 6 символов)" required>
      <input type="password" id="confirmPassword" placeholder="Повторите пароль" required>
      <button type="submit">Сохранить пароль</button>
    </form>
  </div>

  <script>
    const token = new URLSearchParams(window.location.search).get('token');
    
    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const newPass = document.getElementById('newPassword').value;
      const confirmPass = document.getElementById('confirmPassword').value;
      const msgBox = document.getElementById('message');

      if (newPass !== confirmPass) {
        msgBox.innerHTML = '<div class="message error">Пароли не совпадают</div>';
        return;
      }
      if (newPass.length < 6) {
        msgBox.innerHTML = '<div class="message error">Минимум 6 символов</div>';
        return;
      }

      try {
        const res = await fetch('http://localhost:3000/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, newPassword: newPass })
        });
        const data = await res.json();
        
        if (res.ok) {
          msgBox.innerHTML = '<div class="message success">✅ Успешно! Перенаправление...</div>';
          setTimeout(() => window.location.href = 'index.html', 2000);
        } else {
          msgBox.innerHTML = `<div class="message error">❌ ${data.error}</div>`;
        }
      } catch (err) {
        msgBox.innerHTML = '<div class="message error">Ошибка сети</div>';
      }
    });
  </script>
</body>
</html>
